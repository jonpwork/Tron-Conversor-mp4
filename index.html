<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tron Conversor mp4 - Emc³</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --neon-purple: #bc13fe; --success-green: #39ff14; --bg-dark: #0a0b10; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        /* LED Virtual Quântico */
        .led-container { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; background: rgba(255,255,255,0.03); padding: 5px 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .led { width: 10px; height: 10px; border-radius: 50%; background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); animation: pulse 2s infinite; }
        .led.active { background: var(--success-green); box-shadow: 0 0 15px var(--success-green); animation: pulse-active 0.5s infinite; }
        .led-text { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: #555; }

        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        @keyframes pulse-active { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-svg { width: 70px; filter: drop-shadow(0 0 10px var(--neon-blue)); }
        h1 { font-weight: 300; letter-spacing: 5px; text-transform: uppercase; margin: 10px 0 5px; color: var(--neon-blue); font-size: 1.4rem; }
        .credentials { font-size: 0.7rem; color: #666; letter-spacing: 2px; text-transform: uppercase; }

        .glass-card { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 30px; padding: 35px; width: 100%; max-width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.75rem; color: #888; text-transform: uppercase; }
        input[type="file"] { width: 100%; padding: 12px; background: rgba(0,0,0,0.4); border: 1px dashed #333; border-radius: 12px; color: #fff; cursor: pointer; font-size: 0.8rem; }

        .main-btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 600; cursor: pointer; transition: 0.4s; text-transform: uppercase; margin-bottom: 12px; font-size: 0.9rem; }
        .btn-convert { background: linear-gradient(45deg, var(--neon-blue), #0072ff); color: white; box-shadow: 0 4px 15px rgba(0, 242, 255, 0.2); }
        .btn-transcribe { background: rgba(255,255,255,0.05); color: #aaa; border: 1px solid #222; }
        .main-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0, 242, 255, 0.4); }

        #status-msg { display: none; background: rgba(57, 255, 20, 0.1); color: var(--success-green); padding: 15px; border-radius: 12px; text-align: center; margin-top: 20px; border: 1px solid var(--success-green); font-size: 0.8rem; font-weight: 600; }

        .wa-float { position: fixed; bottom: 30px; right: 30px; background: #25d366; width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); transition: 0.3s; }
        .wa-float:hover { transform: scale(1.1) rotate(10deg); }

        textarea { width: 100%; height: 100px; background: rgba(0,0,0,0.5); border: 1px solid #222; border-radius: 12px; color: #ddd; padding: 12px; resize: none; margin-top: 15px; font-size: 0.85rem; display: none; }
        
        .loading-spinner { display: none; width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.2); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="led-container">
        <div id="statusLed" class="led"></div>
        <span class="led-text">Sistema Groq Online</span>
    </div>

    <div class="logo-container">
        <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 15L85 75H15L50 15Z" stroke="#00f2ff" stroke-width="2.5"/>
            <path d="M50 35L65 65H35L50 35Z" stroke="#bc13fe" stroke-width="1.5" opacity="0.6"/>
        </svg>
        <h1>Tron Conversor</h1>
        <div class="credentials">Emc³ | dev: Jon Padilha</div>
    </div>

    <div class="glass-card">
        <div class="input-group">
            <label>Fonte de Áudio</label>
            <input type="file" id="audioInput" accept="audio/*">
        </div>
        <div class="input-group">
            <label>Capa Visual (Imagem)</label>
            <input type="file" id="imageInput" accept="image/*">
        </div>

        <button id="mainBtn" class="main-btn btn-convert" onclick="process('convert')">
            <span id="btnText">Gerar Vídeo Legendado</span>
            <div id="spinner" class="loading-spinner"></div>
        </button>

        <button id="transBtn" class="main-btn btn-transcribe" onclick="process('transcribe')">
            Apenas Transcrever
        </button>

        <div id="status-msg">🚀 MP4 GERADO COM SUCESSO!</div>
        <textarea id="text-box" readonly placeholder="A transcrição aparecerá aqui..."></textarea>
    </div>

    <a href="https://wa.me/55219644440418" target="_blank" class="wa-float">
        <svg width="28" height="28" fill="white" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.06 3.973L0 16l4.104-1.077A7.888 7.888 0 0 0 7.994 14.5c4.367 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 13.066c-1.224 0-2.427-.33-3.475-.955l-.25-.148-2.583.678.69-2.526-.162-.258a6.591 6.591 0 0 1-1.012-3.454c0-3.63 2.961-6.592 6.596-6.592 1.756 0 3.406.684 4.646 1.926 1.242 1.242 1.925 2.89 1.923 4.646-.002 3.631-2.96 6.592-6.59 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.17-.479 1.338-.942.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/></svg>
    </a>

    <script>
        async function process(action) {
            const audio = document.getElementById('audioInput').files[0];
            const image = document.getElementById('imageInput').files[0];
            const btn = document.getElementById('mainBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const led = document.getElementById('statusLed');
            const statusMsg = document.getElementById('status-msg');
            const textBox = document.getElementById('text-box');

            if (!audio) return alert("Ei amor, cadê o áudio?");

            // Ativar LED e Carregamento
            led.classList.add('active');
            btnText.style.display = 'none';
            spinner.style.display = 'block';
            btn.disabled = true;
            statusMsg.style.display = 'none';
            textBox.style.display = 'none';

            const formData = new FormData();
            formData.append('audio', audio);
            if(image) formData.append('image', image);
            formData.append('action', action);

            try {
                const response = await fetch('/process', { method: 'POST', body: formData });
                const data = await response.json();

                if (data.error) throw new Error(data.error);

                if (action === 'convert') {
                    statusMsg.style.display = 'block';
                    const link = document.createElement('a');
                    link.href = data.video_url;
                    link.download = 'Tron_Conversor.mp4';
                    link.click();
                } else {
                    textBox.style.display = 'block';
                    textBox.value = data.transcription;
                }
            } catch (e) {
                alert("Ops! Os motores reclamaram: " + e.message);
            } finally {
                led.classList.remove('active');
                btnText.style.display = 'block';
                spinner.style.display = 'none';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
