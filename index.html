<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tron Converter MP4</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: radial-gradient(circle at center, #020024, #000010);
  color: white;
  overflow-x: hidden;
  min-height: 100vh;
}

/* PARTICLES */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* CENTER CORE */
.core {
  position: relative;
  z-index: 2;
  margin-top: 100px;
  text-align: center;
}

#convertBtn {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  border: none;
  background: radial-gradient(circle, #00eaff, #0044ff);
  color: white;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 0 40px rgba(0,234,255,0.9);
  transition: transform 0.3s;
}

#convertBtn:hover {
  transform: scale(1.08);
}

/* HEX MENU */
.hex-grid {
  display: flex;
  justify-content: center;
  gap: 26px;
  margin-top: 60px;
  z-index: 2;
  position: relative;
}

.hex {
  width: 110px;
  height: 120px;
  background: linear-gradient(145deg, #00eaff, #0066ff);
  clip-path: polygon(
    25% 0%, 75% 0%,
    100% 50%,
    75% 100%,
    25% 100%,
    0% 50%
  );
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
}

.hex:hover {
  transform: scale(1.1);
  box-shadow: 0 0 30px rgba(0,234,255,0.9);
}

/* SALES SECTION */
.sales {
  margin: 100px auto 60px;
  text-align: center;
}

.sales h2 {
  margin-bottom: 20px;
}

.sales a {
  display: inline-block;
  padding: 14px 32px;
  border-radius: 40px;
  background: linear-gradient(90deg, #00eaff, #6f00ff);
  text-decoration: none;
  color: white;
  font-size: 18px;
  box-shadow: 0 0 25px rgba(0,234,255,0.7);
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 22px;
  right: 22px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #25D366;
  font-size: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  color: white;
  animation: pulse 2s infinite;
  z-index: 5;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(37,211,102,.6); }
  70% { box-shadow: 0 0 0 22px rgba(37,211,102,0); }
}

/* TIKTOK */
.tiktok {
  margin: 80px auto;
  max-width: 380px;
  z-index: 2;
  position: relative;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<audio id="bgMusic" autoplay loop>
  <source src="static/universe.mp3" type="audio/mpeg">
</audio>

<div class="core">
  <button id="convertBtn" onclick="startProgress()">Converter</button>
</div>

<div class="hex-grid">
  <div class="hex">Imagem</div>
  <div class="hex">Áudio</div>
  <div class="hex">MP4</div>
</div>

<section class="sales">
  <h2>Conheça meus projetos</h2>
  <a href="https://linktr.ee/jonpadilha" target="_blank">Acessar Página de Vendas</a>
</section>

<div class="tiktok">
  <blockquote class="tiktok-embed"
    cite="https://www.tiktok.com/@jonpadilha369"
    data-unique-id="jonpadilha369"
    data-embed-type="creator">
  </blockquote>
</div>

<a href="https://wa.me/5521964440418" class="whatsapp" target="_blank">💬</a>

<script async src="https://www.tiktok.com/embed.js"></script>

<script>
// MUSIC
const music = document.getElementById("bgMusic");
music.volume = 0.35;

// PROGRESS
function startProgress() {
  const btn = document.getElementById("convertBtn");
  let p = 0;
  btn.disabled = true;
  const i = setInterval(() => {
    p++;
    btn.innerText = `Convertendo ${p}%`;
    if (p >= 100) {
      clearInterval(i);
      btn.innerText = "Concluído ✔";
      btn.disabled = false;
    }
  }, 120);
}

// PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let parts = [];
for (let i = 0; i < 130; i++) {
  parts.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2 + 0.5,
    a: Math.random() * Math.PI * 2,
    s: Math.random() * 0.6 + 0.2
  });
}

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  parts.forEach(p => {
    p.a += 0.01;
    p.x += Math.cos(p.a) * p.s;
    p.y += Math.sin(p.a) * p.s;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = "rgba(0,200,255,0.8)";
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();

window.onresize = () => {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
};
</script>

</body>
  </html>
