<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>TRON · Conversor</title>
<style>
    /* Mantive seu CSS original e adicionei o estilo do átomo */
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
    :root { --neon: #00d4ff; --bg: #000a1a; }
    body { background: var(--bg); color: var(--neon); font-family: 'Orbitron', monospace; margin: 0; overflow: hidden; }
    #orbitCanvas { position:absolute; inset:0; z-index:6; pointer-events:none; }
    .som-btn { position:absolute; top:20px; right:16px; z-index:20; cursor:pointer; background:rgba(0,20,50,0.8); border:1px solid var(--neon); color:var(--neon); padding:10px; }
</style>
</head>
<body>

<button class="som-btn" id="somBtn" onclick="toggleMusic()">SOM: OFF</button>
<canvas id="orbitCanvas"></canvas>

<script>
    // --- LÓGICA DO ÁTOMO ---
    const canvas = document.getElementById('orbitCanvas');
    const ctx = canvas.getContext('2d');
    let w, h;
    
    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let angle = 0;
    function drawAtom() {
        ctx.clearRect(0, 0, w, h);
        const centerX = w / 2;
        const centerY = h / 2;
        
        // Núcleo
        ctx.beginPath();
        ctx.arc(centerX, centerY, 20, 0, Math.PI * 2);
        ctx.fillStyle = '#00d4ff';
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#00d4ff';
        ctx.fill();
        
        // Elétrons
        ctx.shadowBlur = 0;
        for(let i=0; i<3; i++) {
            const orbitRadius = 100 + (i * 40);
            const speed = 0.02 + (i * 0.01);
            const x = centerX + Math.cos(angle * speed) * orbitRadius;
            const y = centerY + Math.sin(angle * speed) * orbitRadius;
            
            ctx.beginPath();
            ctx.arc(x, y, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
        }
        angle += 1;
        requestAnimationFrame(drawAtom);
    }
    drawAtom();

    // --- LÓGICA DO ÁUDIO ---
    const audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'); // SUBSTITUA AQUI PELO SEU LINK
    audio.loop = true;
    let isPlaying = false;

    function toggleMusic() {
        if (!isPlaying) {
            audio.play().then(() => {
                isPlaying = true;
                document.getElementById('somBtn').innerText = "SOM: ON";
            }).catch(e => alert("Toque na tela para iniciar o som"));
        } else {
            audio.pause();
            isPlaying = false;
            document.getElementById('somBtn').innerText = "SOM: OFF";
        }
    }
</script>
</body>
</html>
